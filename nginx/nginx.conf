events {}

http {
  upstream backend {
    server backend:3000;
  }

  upstream minio {
    server minio:9000;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://host.docker.internal:5173;  # React dev server
    }

    location /api/ {
      proxy_pass http://backend/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /storage/ {
      proxy_pass http://minio/;
      proxy_set_header Host $host;
    }
  }
}